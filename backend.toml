# SPDX-License-Identifier: GPL-3.0-only
#:schema https://jorge-menjivar.github.io/super-stt/backend.schema.json
# Mistral backend configuration. See docs/protocol/backend/config.md.

[backend]
    source = "github.com/jorge-menjivar/super-stt-mistral"
    name = "Mistral"
    version = "0.1.0"
    kind = "wasm"
    entrypoint = "mistral.wasm"
    contract = "v1"
    license = "GPL-3.0-only"

[network]
    allowed_hosts = ["api.mistral.ai"]

[capabilities]
    websocket = true

[assets]
    wasm = "mistral.wasm"

[[secrets]]
    name = "mistral_api_key"
    label = "Mistral API key"
    description = "Used to authenticate requests to api.mistral.ai."
    required = true

[[models]]
    name = "voxtral-mini-latest"
    provider = "mistral"
    multilingual = true
    primary_language = "en"
    supported_languages = ["en", "zh", "hi", "es", "ar", "fr", "pt", "ru", "de", "ja", "ko", "it", "nl"]
    supported_devices = ["none"]

[[models]]
    name = "voxtral-mini-transcribe-realtime-2602"
    provider = "mistral"
    multilingual = true
    primary_language = "en"
    supported_languages = ["en", "zh", "hi", "es", "ar", "fr", "pt", "ru", "de", "ja", "ko", "it", "nl"]
    supported_devices = ["none"]
    realtime = true
